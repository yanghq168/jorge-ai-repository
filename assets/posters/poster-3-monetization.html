<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵叙海报 - 创作变现</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
            padding: 20px;
        }
        
        .poster {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            position: relative;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
        }
        
        .coins {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .coin {
            position: absolute;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 700;
            color: #b8860b;
            box-shadow: 0 4px 15px rgba(255,215,0,0.4);
            animation: fall 8s linear infinite;
        }
        
        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(2000px) rotate(720deg); opacity: 0.3; }
        }
        
        .glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(255,215,0,0.3) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 4s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }
        
        .brand-section {
            position: absolute;
            top: 80px;
            left: 80px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .brand-text {
            color: white;
        }
        
        .brand-name {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 4px;
        }
        
        .brand-slogan {
            font-size: 24px;
            opacity: 0.9;
            margin-top: 5px;
        }
        
        .hero-section {
            position: absolute;
            top: 280px;
            left: 0;
            right: 0;
            text-align: center;
        }
        
        .money-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(90deg, #ffd700, #ffed4e);
            color: #333;
            font-size: 36px;
            font-weight: 700;
            padding: 20px 50px;
            border-radius: 50px;
            margin-bottom: 50px;
            box-shadow: 0 10px 30px rgba(255,215,0,0.4);
        }
        
        .badge-icon {
            width: 40px;
            height: 40px;
            fill: #333;
        }
        
        .main-title {
            color: white;
            font-size: 120px;
            font-weight: 900;
            line-height: 1.2;
            text-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        
        .main-title .highlight {
            background: linear-gradient(90deg, #ffd700, #ffed4e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 140px;
        }
        
        .sub-title {
            color: white;
            font-size: 48px;
            margin-top: 40px;
            font-weight: 500;
        }
        
        .earnings-showcase {
            position: absolute;
            top: 850px;
            left: 80px;
            right: 80px;
            display: flex;
            gap: 30px;
        }
        
        .earnings-card {
            flex: 1;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px 30px;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.2);
        }
        
        .earnings-icon {
            width: 70px;
            height: 70px;
            margin: 0 auto 20px;
            fill: white;
        }
        
        .earnings-label {
            color: rgba(255,255,255,0.9);
            font-size: 28px;
            margin-bottom: 15px;
        }
        
        .earnings-value {
            color: white;
            font-size: 52px;
            font-weight: 800;
        }
        
        .earnings-value .currency {
            font-size: 36px;
            font-weight: 600;
        }
        
        .process-section {
            position: absolute;
            bottom: 450px;
            left: 80px;
            right: 80px;
        }
        
        .process-title {
            color: white;
            font-size: 40px;
            text-align: center;
            margin-bottom: 50px;
            font-weight: 600;
        }
        
        .process-steps {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .step {
            text-align: center;
            flex: 1;
        }
        
        .step-number {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 700;
            color: #333;
            margin: 0 auto 25px;
            box-shadow: 0 10px 30px rgba(255,215,0,0.4);
        }
        
        .step-title {
            color: white;
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .step-desc {
            color: rgba(255,255,255,0.8);
            font-size: 24px;
        }
        
        .arrow {
            color: rgba(255,255,255,0.6);
            font-size: 48px;
            font-weight: 700;
        }
        
        .cta-section {
            position: absolute;
            bottom: 150px;
            left: 80px;
            right: 80px;
            text-align: center;
        }
        
        .cta-button {
            display: inline-block;
            background: linear-gradient(90deg, #ffd700, #ffed4e);
            color: #333;
            font-size: 48px;
            font-weight: 700;
            padding: 40px 100px;
            border-radius: 80px;
            text-decoration: none;
            box-shadow: 0 15px 50px rgba(255,215,0,0.5);
        }
        
        .cta-subtext {
            color: white;
            font-size: 32px;
            margin-top: 30px;
            opacity: 0.95;
        }
        
        .footer {
            position: absolute;
            bottom: 50px;
            left: 80px;
            right: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255,255,255,0.8);
            font-size: 24px;
        }
        
        .website {
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="coins">
            <div class="coin" style="left: 10%; animation-delay: 0s;">¥</div>
            <div class="coin" style="left: 25%; animation-delay: 1s;">¥</div>
            <div class="coin" style="left: 40%; animation-delay: 2s;">¥</div>
            <div class="coin" style="left: 55%; animation-delay: 3s;">¥</div>
            <div class="coin" style="left: 70%; animation-delay: 4s;">¥</div>
            <div class="coin" style="left: 85%; animation-delay: 5s;">¥</div>
            <div class="coin" style="left: 15%; animation-delay: 6s;">¥</div>
            <div class="coin" style="left: 60%; animation-delay: 7s;">¥</div>
        </div>
        
        <div class="glow"></div>
        
        <div class="brand-section">
            <div class="logo">◆</div>
            <div class="brand-text">
                <div class="brand-name">灵叙</div>
                <div class="brand-slogan">LINGXU</div>
            </div>
        </div>
        
        <div class="hero-section">
            <div class="money-badge">
                <svg class="badge-icon" viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
                创作即收益
            </div>
            <div class="main-title">
                创作<br>
                <span class="highlight">即变现</span>
            </div>
            <div class="sub-title">写小说，赚收益，快速提现</div>
        </div>
        
        <div class="earnings-showcase">
            <div class="earnings-card">
                <svg class="earnings-icon" viewBox="0 0 24 24"><path d="M18 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2M6 4h5v8l-2.5-1.5L6 12z"/></svg>
                <div class="earnings-label">付费阅读</div>
                <div class="earnings-value"><span class="currency">¥</span>0.1-1</div>
            </div>
            <div class="earnings-card">
                <svg class="earnings-icon" viewBox="0 0 24 24"><path d="M20 6h-2.18c.11-.31.18-.65.18-1a2.996 2.996 0 0 0-5.5-1.65l-.5.67-.5-.68C10.96 2.54 10.05 2 9 2 7.34 2 6 3.34 6 5c0 .35.07.69.18 1H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2M9 5c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1m6 10h-4v-1h4v1m2-3H7V9h10v3z"/></svg>
                <div class="earnings-label">读者打赏</div>
                <div class="earnings-value"><span class="currency">¥</span>1-100</div>
            </div>
            <div class="earnings-card">
                <svg class="earnings-icon" viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.1-.9-2-2-2m0 14H3V5h18z"/></svg>
                <div class="earnings-label">一键动漫</div>
                <div class="earnings-value"><span class="currency">多</span>形态</div>
            </div>
        </div>
        
        <div class="process-section">
            <div class="process-title">简单3步，开启创作变现之路</div>
            <div class="process-steps">
                <div class="step">
                    <div class="step-number">1</div>
                    <div class="step-title">AI创作</div>
                    <div class="step-desc">输入灵感，一键生成</div>
                </div>
                <div class="arrow">→</div>
                <div class="step">
                    <div class="step-number">2</div>
                    <div class="step-title">发布作品</div>
                    <div class="step-desc">上架小说库，触达读者</div>
                </div>
                <div class="arrow">→</div>
                <div class="step">
                    <div class="step-number">3</div>
                    <div class="step-title">获取收益</div>
                    <div class="step-desc">阅读分成，快速提现</div>
                </div>
            </div>
        </div>
        
        <div class="cta-section">
            <div class="cta-button">开始创作变现</div>
            <div class="cta-subtext">你的故事，值得被看见，更值得被付费</div>
        </div>
        
        <div class="footer">
            <div>已有10000+创作者获得收益</div>
            <div class="website">www.aixiaoshuo.tech</div>
        </div>
        
        <div style="position: absolute; bottom: 50px; right: 80px; text-align: center;">
            <div style="width: 150px; height: 150px; background: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden;"><img src="qrcode.jpg" width="140" height="140" style="border-radius: 10px;"></div>
            <div style="color: white; font-size: 20px; margin-top: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.3);">扫码立即体验</div>
        </div>
    </div>
</body>
</html>
