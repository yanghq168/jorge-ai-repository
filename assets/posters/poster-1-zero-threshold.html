<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵叙海报 - 零门槛创作</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
            padding: 20px;
        }
        
        .poster {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
        }
        
        .bg-decoration {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
        }
        
        .circle-1 {
            width: 800px;
            height: 800px;
            top: -200px;
            right: -200px;
        }
        
        .circle-2 {
            width: 600px;
            height: 600px;
            bottom: 100px;
            left: -100px;
        }
        
        .circle-3 {
            width: 400px;
            height: 400px;
            top: 40%;
            right: -100px;
            background: rgba(255,255,255,0.03);
        }
        
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(180deg); }
        }
        
        .brand-section {
            position: absolute;
            top: 80px;
            left: 80px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .brand-text {
            color: white;
        }
        
        .brand-name {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 4px;
        }
        
        .brand-slogan {
            font-size: 24px;
            opacity: 0.9;
            margin-top: 5px;
        }
        
        .hero-section {
            position: absolute;
            top: 280px;
            left: 80px;
            right: 80px;
        }
        
        .main-title {
            color: white;
            font-size: 120px;
            font-weight: 900;
            line-height: 1.1;
            text-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        
        .main-title .highlight {
            background: linear-gradient(90deg, #ffd700, #ffed4e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .sub-title {
            color: white;
            font-size: 48px;
            margin-top: 40px;
            opacity: 0.95;
        }
        
        .illustration {
            position: absolute;
            top: 700px;
            right: 80px;
            width: 500px;
            height: 500px;
        }
        
        .ai-robot {
            position: absolute;
            width: 200px;
            height: 280px;
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
            border-radius: 30px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        
        .robot-face {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
        }
        
        .robot-eye {
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 30px;
        }
        
        .robot-eye.left { left: 25px; }
        .robot-eye.right { right: 25px; }
        
        .robot-body {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 60px;
            background: #e0e0e0;
            border-radius: 15px;
        }
        
        .sparkles {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        
        .sparkle {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #ffd700;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: sparkle 2s ease-in-out infinite;
        }
        
        @keyframes sparkle {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.2) rotate(180deg); opacity: 0.7; }
        }
        
        .features {
            position: absolute;
            bottom: 450px;
            left: 80px;
            right: 80px;
            display: flex;
            gap: 30px;
        }
        
        .feature {
            flex: 1;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .feature-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            fill: white;
        }
        
        .feature-title {
            color: white;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .feature-desc {
            color: rgba(255,255,255,0.8);
            font-size: 24px;
        }
        
        .cta-section {
            position: absolute;
            bottom: 150px;
            left: 80px;
            right: 80px;
            text-align: center;
        }
        
        .cta-button {
            display: inline-block;
            background: linear-gradient(90deg, #ffd700, #ffed4e);
            color: #333;
            font-size: 48px;
            font-weight: 700;
            padding: 40px 100px;
            border-radius: 80px;
            text-decoration: none;
            box-shadow: 0 10px 40px rgba(255,215,0,0.4);
            transition: transform 0.3s;
        }
        
        .cta-text {
            color: white;
            font-size: 32px;
            margin-top: 40px;
            opacity: 0.9;
        }
        
        .qr-section {
            position: absolute;
            bottom: 60px;
            right: 80px;
            text-align: center;
        }
        
        .qr-code {
            width: 150px;
            height: 150px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #666;
        }
        
        .qr-text {
            color: white;
            font-size: 20px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="bg-decoration">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
        </div>
        
        <div class="particles">
            <div class="particle" style="top: 10%; left: 10%;"></div>
            <div class="particle" style="top: 20%; left: 80%; animation-delay: 1s;"></div>
            <div class="particle" style="top: 40%; left: 20%; animation-delay: 2s;"></div>
            <div class="particle" style="top: 60%; left: 70%; animation-delay: 3s;"></div>
            <div class="particle" style="top: 80%; left: 30%; animation-delay: 4s;"></div>
        </div>
        
        <div class="brand-section">
            <div class="logo">◆</div>
            <div class="brand-text">
                <div class="brand-name">灵叙</div>
                <div class="brand-slogan">LINGXU</div>
            </div>
        </div>
        
        <div class="hero-section">
            <div class="main-title">
                不会写？<br>
                <span class="highlight">没关系</span>
            </div>
            <div class="sub-title">有灵叙AI帮你写小说</div>
        </div>
        
        <div class="illustration">
            <div class="ai-robot">
                <div class="robot-face">
                    <div class="robot-eye left"></div>
                    <div class="robot-eye right"></div>
                </div>
                <div class="robot-body"></div>
            </div>
            <div class="sparkles">
                <div class="sparkle" style="top: 10%; left: 10%;"></div>
                <div class="sparkle" style="top: 20%; right: 10%; animation-delay: 0.5s;"></div>
                <div class="sparkle" style="bottom: 20%; left: 5%; animation-delay: 1s;"></div>
                <div class="sparkle" style="bottom: 10%; right: 20%; animation-delay: 1.5s;"></div>
            </div>
        </div>
        
        <div class="features">
            <div class="feature">
                <svg class="feature-icon" viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-7 7c0 2.38 1.19 4.47 3 5.74V17a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-2.26c1.81-1.27 3-3.36 3-5.74a7 7 0 0 0-7-7M9 21a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1v-1H9z"/></svg>
                <div class="feature-title">输入灵感</div>
                <div class="feature-desc">一句话开启创作</div>
            </div>
            <div class="feature">
                <svg class="feature-icon" viewBox="0 0 24 24"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.38-1 1.72v.78h3c1.66 0 3 1.34 3 3v9c0 1.66-1.34 3-3 3H8c-1.66 0-3-1.34-3-3v-9c0-1.66 1.34-3 3-3h3v-.78c-.6-.34-1-.98-1-1.72a2 2 0 0 1 2-2m0 9a2 2 0 1 0 0 4 2 2 0 0 0 0-4m-5 2a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-4a1 1 0 0 0-1-1z"/></svg>
                <div class="feature-title">AI生成</div>
                <div class="feature-desc">大纲人物章节</div>
            </div>
            <div class="feature">
                <svg class="feature-icon" viewBox="0 0 24 24"><path d="M18 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2M6 4h5v8l-2.5-1.5L6 12z"/></svg>
                <div class="feature-title">发布变现</div>
                <div class="feature-desc">创作即有收益</div>
            </div>
        </div>
        
        <div class="cta-section">
            <div class="cta-button">立即开始创作</div>
            <div class="cta-text">让每个人都能成为小说家</div>
        </div>
        
        <div class="qr-section">
            <div class="qr-code"><img src="qrcode.jpg" width="150" height="150" style="border-radius: 10px;"></div>
            <div class="qr-text">扫码立即体验</div>
        </div>
    </div>
</body>
</html>
