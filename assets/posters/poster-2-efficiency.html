<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵叙海报 - 高效创作</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
            padding: 20px;
        }
        
        .poster {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            position: relative;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
        }
        
        /* 动态背景线条 */
        .speed-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .speed-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            height: 2px;
            animation: speed 3s linear infinite;
        }
        
        @keyframes speed {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(1000px); }
        }
        
        /* 品牌区域 */
        .brand-section {
            position: absolute;
            top: 80px;
            left: 80px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .brand-text {
            color: white;
        }
        
        .brand-name {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 4px;
        }
        
        .brand-slogan {
            font-size: 24px;
            opacity: 0.9;
            margin-top: 5px;
        }
        
        /* 主视觉区域 */
        .hero-section {
            position: absolute;
            top: 250px;
            left: 0;
            right: 0;
            text-align: center;
        }
        
        .speed-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            padding: 20px 50px;
            color: white;
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 40px;
        }
        
        .main-title {
            color: white;
            font-size: 140px;
            font-weight: 900;
            line-height: 1;
            text-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        
        .main-title .number {
            font-size: 200px;
            background: linear-gradient(90deg, #fff, #c8ffe0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .sub-title {
            color: white;
            font-size: 56px;
            margin-top: 30px;
            font-weight: 600;
        }
        
        /* 对比图区域 */
        .comparison {
            position: absolute;
            top: 900px;
            left: 80px;
            right: 80px;
            display: flex;
            gap: 40px;
        }
        
        .compare-item {
            flex: 1;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px 40px;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.2);
        }
        
        .compare-item.traditional {
            opacity: 0.7;
        }
        
        .compare-item.ai {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }
        
        .compare-label {
            color: rgba(255,255,255,0.8);
            font-size: 32px;
            margin-bottom: 20px;
        }
        
        .compare-number {
            color: white;
            font-size: 72px;
            font-weight: 800;
        }
        
        .compare-unit {
            color: rgba(255,255,255,0.9);
            font-size: 36px;
            margin-top: 10px;
        }
        
        .vs-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ff6b6b;
            color: white;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
        }
        
        /* AI工具展示 */
        .tools-section {
            position: absolute;
            bottom: 450px;
            left: 80px;
            right: 80px;
        }
        
        .tools-title {
            color: white;
            font-size: 40px;
            text-align: center;
            margin-bottom: 40px;
            font-weight: 600;
        }
        
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }
        
        .tool-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 35px 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s;
        }
        
        .tool-icon {
            font-size: 56px;
            margin-bottom: 15px;
        }
        
        .tool-name {
            color: white;
            font-size: 28px;
            font-weight: 600;
        }
        
        /* CTA区域 */
        .cta-section {
            position: absolute;
            bottom: 150px;
            left: 80px;
            right: 80px;
            text-align: center;
        }
        
        .cta-button {
            display: inline-block;
            background: white;
            color: #11998e;
            font-size: 48px;
            font-weight: 700;
            padding: 40px 100px;
            border-radius: 80px;
            text-decoration: none;
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
        }
        
        .cta-subtext {
            color: white;
            font-size: 32px;
            margin-top: 30px;
            opacity: 0.9;
        }
        
        /* 底部信息 */
        .footer {
            position: absolute;
            bottom: 50px;
            left: 80px;
            right: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255,255,255,0.8);
            font-size: 24px;
        }
        
        .website {
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="poster">
        <!-- 速度线背景 -->
        <div class="speed-lines">
            <div class="speed-line" style="top: 20%; width: 300px; animation-delay: 0s;"></div>
            <div class="speed-line" style="top: 35%; width: 400px; animation-delay: 0.5s;"></div>
            <div class="speed-line" style="top: 50%; width: 250px; animation-delay: 1s;"></div>
            <div class="speed-line" style="top: 65%; width: 350px; animation-delay: 1.5s;"></div>
            <div class="speed-line" style="top: 80%; width: 280px; animation-delay: 2s;"></div>
        </div>
        
        <!-- 品牌区域 -->
        <div class="brand-section">
            <div class="logo">◆</div>
            <div class="brand-text">
                <div class="brand-name">灵叙</div>
                <div class="brand-slogan">LINGXU</div>
            </div>
        </div>
        
        <!-- 主视觉区域 -->
        <div class="hero-section">
            <div class="speed-badge">⚡ 效率提升10倍</div>
            <div class="main-title">
                日更<br>
                <span class="number">10000</span><br>
                字
            </div>
            <div class="sub-title">不是梦</div>
        </div>
        
        <!-- 对比区域 -->
        <div class="comparison">
            <div class="compare-item traditional">
                <div class="compare-label">传统写作</div>
                <div class="compare-number">3000</div>
                <div class="compare-unit">字/天</div>
            </div>
            <div class="compare-item ai">
                <div class="compare-label">AI辅助创作</div>
                <div class="compare-number">10000+</div>
                <div class="compare-unit">字/天</div>
            </div>
            <div class="vs-badge">VS</div>
        </div>
        
        <!-- AI工具展示 -->
        <div class="tools-section">
            <div class="tools-title">4大AI工具，让创作飞起来</div>
            <div class="tools-grid">
                <div class="tool-card">
                    <div class="tool-icon">✍️</div>
                    <div class="tool-name">AI续写</div>
                </div>
                <div class="tool-card">
                    <div class="tool-icon">🎭</div>
                    <div class="tool-name">人物设计</div>
                </div>
                <div class="tool-card">
                    <div class="tool-icon">📋</div>
                    <div class="tool-name">大纲生成</div>
                </div>
                <div class="tool-card">
                    <div class="tool-icon">✨</div>
                    <div class="tool-name">情节优化</div>
                </div>
            </div>
        </div>
        
        <!-- CTA区域 -->
        <div class="cta-section">
            <div class="cta-button">开启高效创作</div>
            <div class="cta-subtext">从此告别卡文，写作从未如此顺畅</div>
        </div>
        
        <!-- 底部 -->
        <div class="footer">
            <div>AI灵智 · 叙述无限</div>
            <div class="website">www.aixiaoshuo.tech</div>
        </div>
        
        <!-- 二维码 -->
        <div style="position: absolute; bottom: 50px; right: 80px; text-align: center;">
            <div style="width: 150px; height: 150px; background: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden;"><img src="qrcode.jpg" width="140" height="140" style="border-radius: 10px;"></div>
            <div style="color: white; font-size: 20px; margin-top: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.3);">扫码立即体验</div>
        </div>
    </div>
</body>
</html>
